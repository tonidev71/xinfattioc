<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinfattioc - Royal Feed</title>
  <style>
    :root { --naranja: #ff7b25; --azul: #0a192f; --fondo: #f0f2f5; }
    body { background: var(--fondo); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 50px; }
    
    header { 
      background: var(--azul); color: var(--naranja); 
      padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--naranja);
    }

    .container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 15px auto; gap: 15px; padding: 0 10px; }
    aside { flex: 1; min-width: 250px; }
    main { flex: 2; min-width: 320px; max-width: 600px; }

    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* CONTENEDOR MULTIMEDIA: SE CIÑE SIN CORTAR */
    .media-box { 
      width: 100%; background: #000; border-radius: 8px; margin: 10px 0;
      display: flex; justify-content: center; align-items: center; overflow: hidden;
      min-height: 200px; max-height: 600px;
    }
    .media-box img, .media-box video { width: 100%; height: auto; max-height: 600px; object-fit: contain; }

    /* BOTONES ACCIÓN CON ICONOS */
    .action-bar { display: flex; justify-content: space-around; border-top: 1px solid #eee; padding-top: 10px; }
    .btn-tool { background: none; border: none; cursor: pointer; font-size: 16px; color: #555; display: flex; align-items: center; gap: 8px; }
    .counter { font-weight: bold; color: var(--naranja); font-size: 14px; }

    textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; font-size: 16px; }
    .btn-orange { background: var(--naranja); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
    .btn-blue { background: var(--azul); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
    
    .btn-salir { color: white; text-decoration: none; border: 1px solid var(--naranja); padding: 5px 12px; border-radius: 5px; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div style="font-weight:bold; letter-spacing:1px;">XINFATTIOC</div>
  <a href="index.html" class="btn-salir">SALIR</a>
</header>

<div class="container">
  
  <aside>
    <div class="card">
      <h4 style="color:var(--naranja); margin-top:0;">🎥 VIRAL</h4>
      <video autoplay muted loop playsinline style="width:100%; border-radius:8px;">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      </video>
    </div>
  </aside>

  <main>
    <div class="card">
      <textarea id="postText" rows="2" placeholder="¿Qué quieres publicar, Toni?"></textarea>
      
      <div id="previewBox" class="media-box" style="background:#f9f9f9; border: 2px dashed #ccc;">
        <p style="color:#999;">Previsualización</p>
      </div>

      <input type="file" id="fileInput" hidden accept="video/*,image/*">
      
      <button class="btn-orange" onclick="document.getElementById('fileInput').click()">📁 SELECCIONAR MULTIMEDIA</button>
      <button class="btn-blue" onclick="crearPost()">🚀 PUBLICAR</button>
    </div>

    <div id="feed"></div>
  </main>

  <aside>
    <div class="card" style="text-align:center;">
      <h4 style="color:var(--azul); margin-top:0;">📢 ADS</h4>
      <p id="adText" style="font-weight:bold; color:var(--naranja);">💎 LUXURY STYLE</p>
    </div>
  </aside>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const previewBox = document.getElementById('previewBox');
  let currentFile = null;

  // Escuchamos cuando seleccionas un archivo
  fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
      currentFile = URL.createObjectURL(file); // Método mucho más rápido para videos grandes
      if (file.type.startsWith('video')) {
        previewBox.innerHTML = `<video src="${currentFile}" controls></video>`;
      } else {
        previewBox.innerHTML = `<img src="${currentFile}">`;
      }
    }
  });

  function crearPost() {
    const text = document.getElementById('postText').value;
    const feed = document.getElementById('feed');

    if (!currentFile && !text) return alert("Añade contenido");

    const post = document.createElement('div');
    post.className = 'card';
    
    // Contenido del post
    let mediaHTML = "";
    if (currentFile) {
      const isVideo = fileInput.files[0].type.startsWith('video');
      mediaHTML = `<div class="media-box">${isVideo ? `<video src="${currentFile}" controls></video>` : `<img src="${currentFile}">`}</div>`;
    }

    post.innerHTML = `
      <div style="font-weight:bold; margin-bottom:10px;">👑 ToniDev71</div>
      <p>${text}</p>
      ${mediaHTML}
      <div class="action-bar">
        <button class="btn-tool" onclick="votar(this)">❤️ <span class="counter">0</span></button>
        <button class="btn-tool" onclick="votar(this)">👍 <span class="counter">0</span></button>
        <button class="btn-tool" onclick="alert('Comentarios habilitados pronto')">💬 <span>Globo</span></button>
        <button class="btn-tool" onclick="compartir()">📤</button>
      </div>
    `;
    
    feed.prepend(post);
    
    // Resetear formulario
    document.getElementById('postText').value = "";
    previewBox.innerHTML = '<p style="color:#999;">Previsualización</p>';
    currentFile = null;
  }

  function votar(btn) {
    let span = btn.querySelector('.counter');
    if(span) {
      span.innerText = parseInt(span.innerText) + 1;
      btn.style.color = "var(--naranja)";
    }
  }

  function compartir() {
    if (navigator.share) {
      navigator.share({ title: 'Xinfattioc', url: window.location.href });
    } else {
      alert("Enlace copiado");
    }
  }

  // Rotación de anuncios
  const ads = ["💎 ÉXITO MARAJÁ", "🚀 TONIDEV71 PRO", "🧡 COMUNIDAD VIP"];
  let i = 0;
  setInterval(() => {
    document.getElementById('adText').innerText = ads[i];
    i = (i + 1) % ads.length;
  }, 3000);
</script>

</body>
</html>
