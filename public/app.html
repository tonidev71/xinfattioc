<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinfattioc - Oficial</title>
  <style>
    :root { --naranja: #ff7b25; --azul: #0a192f; --fondo: #f4f4f4; }
    
    body { background: var(--fondo); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
    
    /* HEADER CON BOTÓN SALIR */
    header { 
      background: var(--azul); color: var(--naranja); 
      padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--naranja);
    }
    
    .btn-salir { color: white; text-decoration: none; border: 1px solid var(--naranja); padding: 5px 15px; border-radius: 5px; font-size: 14px; }

    /* LAYOUT QUE SE VEA BIEN EN TODO */
    .container { 
      display: flex; flex-wrap: wrap; justify-content: center; 
      max-width: 1300px; margin: 20px auto; gap: 15px; padding: 0 10px; 
    }

    aside { flex: 1; min-width: 250px; max-width: 300px; }
    main { flex: 2; min-width: 320px; max-width: 600px; }

    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* MULTIMEDIA TAMAÑO FIJO */
    .media-box { 
      width: 100%; aspect-ratio: 16 / 9; background: #000; 
      display: flex; align-items: center; justify-content: center; 
      overflow: hidden; border-radius: 8px; margin: 10px 0;
    }
    .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }

    /* BOTONES ACCIÓN */
    .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #eee; margin-top: 10px; }
    .btn-action { background: none; border: none; padding: 10px; cursor: pointer; font-weight: bold; color: #555; }
    .btn-action:hover { color: var(--naranja); }

    /* CAJA DE TEXTO */
    textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; resize: none; box-sizing: border-box; }

    /* COMENTARIOS */
    .comment-list { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 14px; margin-top: 10px; }

    /* VIDEO VIRAL IZQUIERDA */
    .viral-vids video { border-radius: 10px; width: 100%; margin-bottom: 10px; border: 2px solid var(--naranja); }
  </style>
</head>
<body>

<header>
  <div style="font-weight:bold; letter-spacing:2px;">XINFATTIOC</div>
  <a href="index.html" class="btn-salir">SALIR</a>
</header>

<div class="container">
  
  <aside class="viral-vids">
    <div class="card">
      <h3 style="color:var(--naranja); margin-top:0;">🔥 Viral Real</h3>
      <video controls loop muted>
        <source src="URL_DE_TU_VIDEO_VIRAL.mp4" type="video/mp4">
      </video>
      <p style="font-size:12px;">Lo que está pasando ahora mismo en el Reino.</p>
    </div>
  </aside>

  <main>
    <div class="card">
      <textarea id="texto-post" rows="3" placeholder="¿Qué quieres contar hoy, Marajá?"></textarea>
      
      <div class="media-box" id="preview-container">
        <p style="color:#666;">Selecciona una foto o vídeo</p>
      </div>

      <div style="display:flex; gap:10px;">
        <label style="flex:1; text-align:center; padding:10px; border:1px solid var(--azul); border-radius:8px; cursor:pointer;">
          📁 Elegir Archivo
          <input type="file" id="archivo" hidden accept="image/*,video/*" onchange="preview(this)">
        </label>
        <button onclick="publicar()" style="flex:1; background:var(--naranja); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">PUBLICAR</button>
      </div>
    </div>

    <div id="feed">
      </div>
  </main>

  <aside>
    <div class="card">
      <h3 style="color:var(--azul); margin-top:0;">💎 VIP Ads</h3>
      <div id="ad-space" style="text-align:center; font-weight:bold; color:var(--naranja);">
        Espacio para Publicidad Real
      </div>
    </div>
  </aside>

</div>

<script>
  // PREVISUALIZAR
  function preview(input) {
    const box = document.getElementById('preview-container');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        if (input.files[0].type.includes('video')) {
          box.innerHTML = `<video controls src="${e.target.result}"></video>`;
        } else {
          box.innerHTML = `<img src="${e.target.result}">`;
        }
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  // PUBLICAR
  function publicar() {
    const txt = document.getElementById('texto-post').value;
    const media = document.getElementById('preview-container').innerHTML;
    const feed = document.getElementById('feed');

    if (txt.trim() === "" && media.includes("Selecciona")) return;

    const post = document.createElement('div');
    post.className = 'card';
    post.innerHTML = `
      <div style="font-weight:bold; color:var(--azul); margin-bottom:10px;">👑 ToniDev71</div>
      <p>${txt}</p>
      <div class="media-box">${media}</div>
      <div class="actions">
        <button class="btn-action" onclick="this.style.color='#ff7b25'">❤️ Like</button>
        <button class="btn-action" onclick="alert('Escribe en la base de datos...')">💬 Comentar</button>
        <button class="btn-action" onclick="navigator.share({url:location.href})">📤 Compartir</button>
      </div>
    `;
    feed.prepend(post);
    
    // Reset
    document.getElementById('texto-post').value = "";
    document.getElementById('preview-container').innerHTML = `<p style="color:#666;">Selecciona una foto o vídeo</p>`;
  }

  // ANUNCIOS
  const ads = ["💎 Éxito Marajá", "🚀 ToniDev71 Pro", "🧡 Publicidad Real"];
  let i = 0;
  setInterval(() => {
    document.getElementById('ad-space').innerText = ads[i];
    i = (i + 1) % ads.length;
  }, 3000);
</script>

</body>
</html>
