<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinfattioc Pro</title>
  <style>
    :root { --naranja: #ff7b25; --azul: #0a192f; --fondo: #ffffff; }
    body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; }
    
    header { 
      background: var(--azul); color: var(--naranja); 
      padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--naranja);
    }

    .container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 20px auto; gap: 15px; padding: 0 10px; }
    aside { flex: 1; min-width: 250px; }
    main { flex: 2; min-width: 320px; max-width: 600px; }

    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; }

    /* CONTENEDOR MULTIMEDIA: AQUÍ ESTÁ EL TRUCO PARA NO CORTAR FOTOS */
    .media-display { 
      width: 100%; 
      background: #000; 
      border-radius: 8px; 
      margin: 10px 0;
      max-height: 500px; /* Para que no sea infinito */
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .media-display img, .media-display video { 
      max-width: 100%; 
      max-height: 500px; 
      object-fit: contain; /* SE CIÑE SIN CORTAR */
    }

    /* BOTONES CON ICONOS */
    .action-bar { display: flex; justify-content: space-around; border-top: 1px solid #eee; padding-top: 10px; }
    .btn-tool { background: none; border: none; cursor: pointer; font-size: 14px; color: #555; display: flex; align-items: center; gap: 5px; }
    .btn-tool:hover { color: var(--naranja); }
    .counter { font-weight: bold; color: var(--naranja); }

    textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; }
    .btn-main { width: 100%; background: var(--naranja); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    
    .btn-salir { color: white; text-decoration: none; border: 1px solid var(--naranja); padding: 5px 12px; border-radius: 5px; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div style="font-weight:bold; letter-spacing:1px;">XINFATTIOC</div>
  <a href="index.html" class="btn-salir">CERRAR SESIÓN</a>
</header>

<div class="container">
  
  <aside>
    <div class="card">
      <h4 style="color:var(--naranja); margin-top:0;">🎥 VIRAL AHORA</h4>
      <div class="media-display">
        <video autoplay muted loop playsinline src="https://www.w3schools.com/html/mov_bbb.mp4" style="width:100%"></video>
      </div>
    </div>
  </aside>

  <main>
    <div class="card">
      <textarea id="postText" rows="2" placeholder="¿Qué tienes en mente?"></textarea>
      <div id="dropZone" class="media-display" style="background:#f9f9f9; border: 2px dashed #ccc;">
        <p id="msg">Vista previa de tu vídeo/foto</p>
      </div>
      <input type="file" id="fileInput" hidden accept="video/*,image/*" onchange="handleFile(this)">
      <button class="btn-main" onclick="document.getElementById('fileInput').click()">📁 SELECCIONAR ARCHIVO</button>
      <button class="btn-main" style="background:var(--azul)" onclick="publicarAhora()">🚀 PUBLICAR EN EL MURO</button>
    </div>

    <div id="wall"></div>
  </main>

  <aside>
    <div class="card">
      <h4 style="color:var(--azul); margin-top:0;">📢 PUBLICIDAD</h4>
      <div id="adBox" style="font-weight:bold; color:var(--naranja); text-align:center;">
        💎 XINFATTIOC VIP 💎
      </div>
    </div>
  </aside>
</div>

<script>
  let fileData = null;
  let fileType = '';

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    fileType = file.type;
    const reader = new FileReader();
    reader.onload = (e) => {
      fileData = e.target.result;
      const zone = document.getElementById('dropZone');
      if (fileType.includes('video')) {
        zone.innerHTML = `<video src="${fileData}" controls style="max-width:100%"></video>`;
      } else {
        zone.innerHTML = `<img src="${fileData}">`;
      }
    };
    reader.readAsDataURL(file);
  }

  function publicarAhora() {
    const txt = document.getElementById('postText').value;
    if (!fileData && !txt) return alert("Escribe algo o sube un archivo");

    const wall = document.getElementById('wall');
    const post = document.createElement('div');
    post.className = 'card';
    
    // Generar estructura del post con contadores
    post.innerHTML = `
      <div style="font-weight:bold; margin-bottom:10px;">👑 ToniDev71</div>
      <p>${txt}</p>
      <div class="media-display">
        ${fileType.includes('video') ? `<video src="${fileData}" controls></video>` : `<img src="${fileData}">`}
      </div>
      <div class="action-bar">
        <button class="btn-tool" onclick="sumar(this)">❤️ <span class="counter">0</span></button>
        <button class="btn-tool" onclick="sumar(this)">👍 <span class="counter">0</span></button>
        <button class="btn-tool" onclick="alert('Comentarios próximamente')">💬 <span>Globo</span></button>
        <button class="btn-tool" onclick="navigator.share({url:location.href})">📤</button>
      </div>
    `;
    wall.prepend(post);

    // Limpiar
    document.getElementById('postText').value = "";
    document.getElementById('dropZone').innerHTML = "Vista previa";
    fileData = null;
  }

  function sumar(btn) {
    let count = btn.querySelector('.counter');
    if (count) {
      count.innerText = parseInt(count.innerText) + 1;
      btn.style.color = "var(--naranja)";
    }
  }

  // Anuncios rotativos
  const ads = ["💎 Éxito Total", "🚀 ToniDev71 Pro", "🧡 Comunidad VIP"];
  let i = 0;
  setInterval(() => {
    document.getElementById('adBox').innerText = ads[i];
    i = (i + 1) % ads.length;
  }, 3000);
</script>

</body>
</html>
