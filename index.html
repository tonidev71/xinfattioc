<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinfattioc - Login</title>
  <style>
    :root { --naranja: #ff7b25; --azul: #0a192f; }
    body { background: #ffffff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-card { width: 85%; max-width: 320px; text-align: center; }
    h1 { font-weight: 300; letter-spacing: 2px; color: var(--azul); }
    input { width: 100%; padding: 12px 0; margin: 10px 0; border: none; border-bottom: 1px solid #eee; outline: none; }
    button { width: 100%; padding: 12px; margin-top: 30px; background: transparent; color: var(--naranja); border: 1px solid var(--naranja); border-radius: 5px; cursor: pointer; }
    .copy { margin-top: 40px; font-size: 10px; color: #aaa; }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="/icon-192x192.png" width="70">
    <h1>XINFATTIOC</h1>
    <input type="text" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">
    <button onclick="window.location.href='/app.html'">ACCEDER</button>
    <div class="copy">RESERVADO DERECHO <br> WWW.TONIDEV71.COM &copy;</div>
  </div>
</body>
</html>
